# docker-compose.yml
version: "3.9"

services:
  dashboard:
    build: .
    container_name: golden-signal-dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data        # lets you swap CSV without rebuilding
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501/_stcore/health')"]
      interval: 30s
      timeout: 5s
      start-period: 10s
      retries: 3
    restart: unless-stopped
